<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Sardar Ji Food Corner App</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #182316;
        background:
          radial-gradient(circle at top right, rgba(243, 202, 66, 0.18), transparent 24%),
          linear-gradient(180deg, #f7f8ef 0%, #eef3df 100%);
      }

      .offline-shell {
        max-width: 360px;
        padding: 28px 24px;
        border-radius: 28px;
        text-align: center;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 28px 70px rgba(15, 23, 42, 0.16);
      }

      img {
        width: min(100%, 220px);
        margin: 0 auto 18px;
        display: block;
      }

      h1 {
        margin: 0 0 10px;
        font: 800 28px/1.05 Poppins, Inter, system-ui, sans-serif;
      }

      p {
        margin: 0;
        color: #5d6d5a;
        line-height: 1.6;
      }

      button {
        margin-top: 18px;
        padding: 14px 18px;
        border: 0;
        border-radius: 999px;
        color: #fff;
        background: linear-gradient(135deg, #ff8d2b, #ff6b00);
        font: 700 15px/1 Inter, system-ui, sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        body {
          color: #f4f7f2;
          background:
            radial-gradient(circle at top right, rgba(243, 202, 66, 0.12), transparent 24%),
            linear-gradient(180deg, #101713 0%, #0f1512 100%);
        }

        .offline-shell {
          background: rgba(20, 25, 23, 0.88);
          box-shadow: 0 32px 90px rgba(0, 0, 0, 0.35);
        }

        p {
          color: #a8b4aa;
        }
      }
    </style>
  </head>
  <body>
    <div class="offline-shell">
      <img src="/brand-logo-light.png" alt="Sardar Ji Food Corner" />
      <h1>You're offline</h1>
      <p>The app shell is still here. Reconnect to refresh menu data and place new orders.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
